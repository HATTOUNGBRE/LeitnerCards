<div class="min-h-screen flex items-center justify-center" style="background-color: #f5f0eb;">
  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">

    <p class="text-xs font-semibold tracking-widest uppercase mb-1" style="color: #9b6b6b;">
      LeitnerCards
    </p>
    <h1 class="text-3xl font-serif font-bold mb-1" style="color: #2d2d2d;">
      Bon retour.
    </h1>
    <p class="text-sm mb-8" style="color: #9b8e85;">
      Connectez-vous pour accéder à vos fiches
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider mb-1" style="color: #6b5e5e;">
          Email
        </label>
        <input
          formControlName="email"
          type="email"
          placeholder="alice@leitner.com"
          class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition"
          style="border-color: #ddd6ce; background-color: #faf8f6;"
          [class.border-red-400]="form.controls.email.invalid && form.controls.email.touched"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider mb-1" style="color: #6b5e5e;">
          Mot de passe
        </label>
        <input
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 transition"
          style="border-color: #ddd6ce; background-color: #faf8f6;"
          [class.border-red-400]="form.controls.password.invalid && form.controls.password.touched"
        />
      </div>

      @if (error()) {
        <p class="text-red-500 text-sm">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full py-2.5 rounded-xl text-sm font-semibold text-white transition disabled:opacity-50"
        style="background-color: #7c4f6e;">
        {{ isLoading() ? 'Connexion...' : 'Se connecter' }}
      </button>

    </form>

    <p class="text-xs mt-6 text-center" style="color: #b0a49c;">
      test@mail.com · password
    </p>

  </div>
</div>
