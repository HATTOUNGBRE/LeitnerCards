<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white rounded-xl shadow p-8 w-full max-w-sm">

    <h1 class="text-xl font-bold mb-2">LeitnerCards</h1>
    <p class="text-sm text-gray-500 mb-6">Connectez-vous pour accéder à vos fiches</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          formControlName="email"
          type="email"
          placeholder="alice@leitner.com"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-400]="form.controls.email.invalid && form.controls.email.touched"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-400]="form.controls.password.invalid && form.controls.password.touched"
        />
      </div>

      @if (error()) {
        <p class="text-red-500 text-sm">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 transition">
        {{ isLoading() ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="text-xs text-gray-400 mt-4 text-center">
      alice@leitner.com · password123
    </p>
  </div>
</div>
